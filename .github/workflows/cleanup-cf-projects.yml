name: Cleanup old CF Pages projects
on:
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: List and delete stale projects
        run: |
          echo "=== FETCHING CLOUDFLARE PAGES PROJECTS ==="
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "Raw response: $RESPONSE"
          PROJECTS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result') or []; [print(p['name']) for p in r]")
          echo "=== PROJECTS FOUND ==="
          echo "$PROJECTS"
          KEEP="seforge-qsuite seforge-psuite seforge-nervecenter sriranganathar-qsuite sriranganathar-psuite sriranganathar-nervecenter"
          for PROJECT in $PROJECTS; do
            if echo "$KEEP" | grep -qw "$PROJECT"; then
              echo "KEEPING: $PROJECT"
            else
              echo "DELETING: $PROJECT"
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/$PROJECT" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
              echo ""
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
