name: Cleanup old CF Pages projects
on:
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: List all projects
        run: |
          echo "=== ALL CLOUDFLARE PAGES PROJECTS ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(p['name']) for p in d.get('result',[])]"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Delete stale projects
        run: |
          echo "=== DELETING STALE PROJECTS ==="
          PROJECTS=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(p['name']) for p in d.get('result',[])]")
          KEEP="seforge-qsuite seforge-psuite seforge-nervecenter sriranganathar-qsuite sriranganathar-psuite sriranganathar-nervecenter"
          for PROJECT in $PROJECTS; do
            if echo "$KEEP" | grep -qw "$PROJECT"; then
              echo "KEEPING: $PROJECT"
            else
              echo "DELETING: $PROJECT"
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
              echo ""
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
